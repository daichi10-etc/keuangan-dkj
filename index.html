<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DKJ Finance</title>

<style>

body{
  font-family:Arial;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:20px;
}

.box{
  max-width:500px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#ff4d6d;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:gray;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
  color:#444;
}

select,input,textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff4d6d,#ff758c);
  color:white;
  font-weight:bold;
  font-size:16px;
}

#status{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}

.icon{
  font-size:18px;
  margin-right:5px;
}

</style>
</head>

<body>

<div class="box">

<h1>💸 DKJ FINANCE</h1>
<div class="sub">Sistem Keuangan DKJ Group</div>

<label>📌 Jenis Transaksi</label>
<select id="tipe">
<option value="pemasukan">💰 Pemasukan</option>
<option value="pengeluaran">🛒 Pengeluaran</option>
<option value="utang">📋 Hutang</option>
</select>

<label>👤 Nama Penginput</label>
<input type="text" id="penginput" placeholder="Nama">

<label>🏢 Cabang</label>
<select id="cabang">
<option>DEKAJE METRO</option>
<option>DEKAJE WAY JEPARA</option>
<option>MIE RAWUH</option>
<option>FOTIVA</option>
<option>PRIBADI</option>
</select>

<label>📂 Kategori</label>
<select id="kategori">

<option>💰 Omzet Harian</option>

<option>🛒 Belanja Bahan</option>

<option>🏠 Rumah Tangga</option>

<option>👤 Pribadi Owner</option>

<option>💳 Bayar Hutang</option>

<option>📋 Tambah Hutang</option>

<option>📦 Lainnya</option>

</select>

<label>💵 Cash</label>
<input type="number" id="cash" placeholder="Cash">

<label>📲 Online / Transfer</label>
<input type="number" id="online" placeholder="Online">

<label>🧾 Total</label>
<input type="number" id="total" placeholder="Total">

<label>📝 Catatan</label>
<textarea id="catatan" placeholder="Catatan tambahan"></textarea>

<label>📸 Upload Foto Nota</label>
<input type="file" accept="image/*" capture="environment">

<button onclick="kirimData()">🚀 Kirim Data</button>

<p id="status"></p>

</div>

<script>

function kirimData(){

document.getElementById("status").innerText = "⏳ Mengirim data...";

const data = {

  tipe: document.getElementById("tipe").value,

  penginput: document.getElementById("penginput").value,

  sumber: document.getElementById("cabang").value,

  cabang: document.getElementById("cabang").value,

  kategori: document.getElementById("kategori").value,

  jenisPemasukan: document.getElementById("kategori").value,

  namaBarang: document.getElementById("kategori").value,

  cash: document.getElementById("cash").value,

  online: document.getElementById("online").value,

  total: document.getElementById("total").value,

  jumlah: document.getElementById("cash").value,

  satuan: "-",

  sumberUang: "Kas",

  catatan: document.getElementById("catatan").value,

  foto: "Upload Menyusul",

  namaUtang: document.getElementById("kategori").value,

  jenisTransaksi: document.getElementById("kategori").value,

  tambahanUtang: document.getElementById("cash").value,

  pembayaran: document.getElementById("online").value,

  sisaUtang: document.getElementById("total").value,

  jatuhTempo: "-",

  status: "Aktif"

};

fetch("https://script.google.com/macros/s/AKfycbxPBMSGLb-HV9yk7LPWb5HL1IKFYzaj5dL5DYJbHFPHyscKHFchso9UYvsxkTvbawxvdA/exec",{

  method:"POST",

  body:JSON.stringify(data)

})

.then(()=>{

  document.getElementById("status").innerText = "✅ Data berhasil dikirim";

})

.catch(()=>{

  document.getElementById("status").innerText = "❌ Gagal kirim";

});

}

</script>

</body>
</html>
