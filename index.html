<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DKJ Finance</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:20px;
}

.box{
  max-width:520px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
  text-align:center;
  color:#ff4d6d;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:gray;
  margin-bottom:20px;
}

label{
  display:block;
  margin-top:12px;
  font-weight:bold;
  color:#444;
}

select,input,textarea{
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ddd;
  font-size:14px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff4d6d,#ff758c);
  color:white;
  font-weight:bold;
  font-size:16px;
}

#status{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>💸 DKJ FINANCE</h1>
<div class="sub">Sistem Keuangan DKJ Group</div>

<label>📌 Jenis Transaksi</label>
<select id="tipe">
  <option value="pemasukan">💰 Pemasukan</option>
  <option value="pengeluaran">🛒 Pengeluaran</option>
  <option value="utang">📋 Hutang</option>
</select>

<label>👤 Nama Penginput</label>
<input type="text" id="penginput" placeholder="Nama penginput">

<label>🏢 Cabang / Sumber</label>
<select id="cabang">
  <option>DEKAJE METRO</option>
  <option>DEKAJE WAY JEPARA</option>
  <option>MIE RAWUH</option>
  <option>FOTIVA</option>
  <option>PRIBADI</option>
  <option>LAINNYA</option>
</select>

<label>📂 Kategori</label>
<select id="kategori">
  <option>Omzet Harian</option>
  <option>Belanja Bahan</option>
  <option>Operasional</option>
  <option>Rumah Tangga</option>
  <option>Pribadi Owner</option>
  <option>Bayar Hutang</option>
  <option>Tambah Hutang</option>
  <option>Lainnya</option>
</select>

<label>🧺 Nama Barang / Pengeluaran</label>
<input type="text" id="namaBarang" placeholder="Contoh: Ayam, Mie, Gula, Bensin">

<label>⚖️ Jumlah / Ukuran</label>
<input type="text" id="jumlahUkuran" placeholder="Contoh: 10 kg, 2 liter, 20 pcs">

<label>💳 Sumber Dana</label>
<select id="sumberUang">
  <option>Kas Cabang</option>
  <option>Uang Pribadi Owner</option>
  <option>Online Cair</option>
  <option>Hutang / Bon</option>
  <option>Lainnya</option>
</select>

<label>💵 Cash</label>
<input type="number" id="cash" placeholder="Nominal cash">

<label>📲 Online / Transfer</label>
<input type="number" id="online" placeholder="Nominal online / transfer">

<label>🧾 Total</label>
<input type="number" id="total" placeholder="Total transaksi">

<label>📝 Catatan</label>
<textarea id="catatan" placeholder="Catatan tambahan"></textarea>

<label>📸 Upload Foto Nota / Bukti</label>
<input type="file" accept="image/*" capture="environment">

<button onclick="kirimData()">🚀 Kirim Data</button>

<p id="status"></p>

</div>

<script>
function kirimData(){

  document.getElementById("status").innerText = "⏳ Mengirim data...";

  const tipe = document.getElementById("tipe").value;
  const penginput = document.getElementById("penginput").value;
  const cabang = document.getElementById("cabang").value;
  const kategori = document.getElementById("kategori").value;
  const namaBarang = document.getElementById("namaBarang").value;
  const jumlahUkuran = document.getElementById("jumlahUkuran").value;
  const sumberUang = document.getElementById("sumberUang").value;
  const cash = document.getElementById("cash").value || 0;
  const online = document.getElementById("online").value || 0;
  const total = document.getElementById("total").value || 0;
  const catatan = document.getElementById("catatan").value;

  const data = {
    tipe: tipe,

    penginput: penginput,

    sumber: cabang,
    cabang: cabang,

    kategori: kategori,
    jenisPemasukan: kategori,

    namaBarang: namaBarang,
    jumlahUkuran: jumlahUkuran,

    cash: cash,
    online: online,
    total: total,

    sumberUang: sumberUang,

    catatan: catatan,
    foto: "Upload Menyusul",

    namaUtang: namaBarang || cabang,
    jenisTransaksi: kategori,
    tambahanUtang: cash,
    pembayaran: online,
    sisaUtang: total,
    jatuhTempo: "-",
    status: "Aktif"
  };

  fetch("https://script.google.com/macros/s/AKfycbxPBMSGLb-HV9yk7LPWb5HL1IKFYzaj5dL5DYJbHFPHyscKHFchso9UYvsxkTvbawxvdA/exec",{
    method:"POST",
    body:JSON.stringify(data)
  })
  .then(()=>{
    document.getElementById("status").innerText = "✅ Data berhasil dikirim";
  })
  .catch(()=>{
    document.getElementById("status").innerText = "❌ Gagal kirim";
  });

}
</script>

</body>
</html>
